services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # API_INTERNAL_URL: used by Next.js server-side (inside Docker network)
      # NEXT_PUBLIC_API_URL: used by browser-side fetches (resolves from the host)
      - API_INTERNAL_URL=http://api:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  api:
    build: ./api
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ./api:/app

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
